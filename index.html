<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="rome2026.css">
  <title>Rome 2026, Michael King</title>
</head>
<body>
  <header><h1>Michael King</h1></header> 
  <div class="title">
    <h2>Rome, 2026</h2>
  </div>

  <div class="slider-container">
    <div class="slider" id="slider">
      <div class="slide"><img src="photo1.jpg" alt="vatican"></div>
      <div class="slide"><img src="photo2.jpg" alt="painting"></div>
      <div class="slide"><img src="photo3.jpg" alt="ceiling"></div>
      <div class="slide"><img src="photo4.jpg" alt="church"></div>
      <div class="slide"><img src="photo5.jpg" alt="wall-painting"></div>
      <div class="slide"><img src="photo6.jpg" alt="marble-entrance"></div>
      <div class="slide"><img src="photo7.jpg" alt="river-view"></div>
      <div class="slide"><img src="photo8.jpg" alt="basilica"></div>
    </div>
    <div class="dots" id="dots"></div>
    <button class="arrow arrow-left" id="prev">‹</button>
    <button class="arrow arrow-right" id="next">›</button>
  </div>

  <!-- Script moved to bottom -->
  <script src="rome2026.js"></script>
</body>
</html>
